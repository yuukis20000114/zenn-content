# Docker Compose configuration for Zenn content + Claude Code environment

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # プロキシ設定を.envから読み込む
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        no_proxy: ${no_proxy:-}

    volumes:
      # プロジェクトディレクトリ
      - ./:/work
      # Claude Code認証永続化（コンテナ再作成でも認証維持）
      - claude-config:/root/.claude
      # Codex CLI認証永続化
      - codex-config:/root/.codex
      # Playwrightブラウザキャッシュ
      - playwright-cache:/root/.cache/ms-playwright
      # npm globalキャッシュ（再ビルド高速化）
      - npm-global:/root/.npm-global
      # uvキャッシュ（再ビルド高速化）
      - uv-cache:/root/.cache/uv

    environment:
      # タイムゾーン
      - TZ=${TZ:-Asia/Tokyo}

      # Python設定
      - PYTHONUNBUFFERED=1

      # Claude Code設定
      - CLAUDE_CONFIG_DIR=/root/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}

      # プロキシ設定（ランタイム用）
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      - no_proxy=${no_proxy:-localhost,127.0.0.1}

    tty: true
    stdin_open: true

    # コンテナを永続化（開発用）
    command: tail -f /dev/null

# 名前付きボリューム定義
volumes:
  # Claude Code認証情報永続化
  claude-config:
    name: ${COMPOSE_PROJECT_NAME:-zenn-content}_claude-config

  # Codex CLI認証情報永続化
  codex-config:
    name: ${COMPOSE_PROJECT_NAME:-zenn-content}_codex-config

  # Playwrightブラウザキャッシュ
  playwright-cache:
    name: ${COMPOSE_PROJECT_NAME:-zenn-content}_playwright-cache

  # npm globalパッケージキャッシュ
  npm-global:
    name: ${COMPOSE_PROJECT_NAME:-zenn-content}_npm-global

  # uvパッケージキャッシュ
  uv-cache:
    name: ${COMPOSE_PROJECT_NAME:-zenn-content}_uv-cache
